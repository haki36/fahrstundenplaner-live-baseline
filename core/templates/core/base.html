<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Fahrstundenplaner{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/locales-all.global.min.js"></script>
  <style>
    :root{ --brand:#111827; --accent:#2563eb; --danger:#dc2626; --card-radius:12px; --today-bg:#fff8dc; }
    body{font-family:system-ui,Segoe UI,Arial,sans-serif;margin:0;background:#f7f7f8;}
    .nav{background:var(--brand);color:#fff;}
    /* Desktop: volle Breite auf großen Screens (kein max-width Limit) */
    .nav .wrap{max-width:none;margin:0;padding:10px 14px;display:flex;align-items:center;gap:18px;}
    .nav a{color:#cbd5e1;text-decoration:none;padding:8px 10px;border-radius:8px}
    .nav a.active,.nav a:hover{background:rgba(255,255,255,.12);color:#fff}
    .content{max-width:none;margin:16px 0;padding:0 14px}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,.05)}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px;border-bottom:1px solid #eee}
    .btn{padding:8px 12px;border-radius:8px;border:1px solid #d1d5db;background:#fff;cursor:pointer}
    .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
    .btn.danger{background:var(--danger);border-color:var(--danger);color:#fff}
    input,select,textarea{height:36px;border:1px solid #d1d5db;border-radius:8px;padding:0 8px}
    textarea{height:auto;padding:8px}
    .grid{display:grid;gap:10px}
    .grid.cols-2{grid-template-columns:1fr 1fr}
    .grid.cols-3{grid-template-columns:1fr 1fr 1fr}
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <div class="wrap">
      <div style="font-weight:800;">Fahrstundenplaner</div>
      <a href="{% url 'calendar' %}" class="{% if active == 'calendar' %}active{% endif %}">Kalender</a>
      <a href="{% url 'students_page' %}" class="{% if active == 'students' %}active{% endif %}">Fahrschüler</a>
      <a href="{% url 'instructors_page' %}" class="{% if active == 'instructors' %}active{% endif %}">Fahrlehrer</a>
      <a href="{% url 'vehicles_page' %}" class="{% if active == 'vehicles' %}active{% endif %}">Fahrzeuge</a>
      <a href="{% url 'types_page' %}" class="{% if active == 'types' %}active{% endif %}">Fahrttypen</a>
      <a href="{% url 'settings_page' %}" class="{% if active == 'settings' %}active{% endif %}">Einstellungen</a>
    </div>
  </nav>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
