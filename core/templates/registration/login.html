{% load static %}
<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-50 flex items-center justify-center">

  <div class="w-full max-w-sm bg-white p-6 rounded-xl shadow">

    <div class="flex justify-center mb-6">
      <img src="{% static 'img/logo.png' %}" class="w-72 mx-auto">
    </div>

    <h1 class="text-xl font-bold mb-4 text-center">Anmelden</h1>

    {% if form.errors %}
      <div class="mb-3 text-sm text-red-700">Benutzername oder Passwort ist falsch.</div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}

      <label class="block text-sm mb-1">Benutzername</label>
      <input name="username" class="w-full border rounded-md px-3 py-2 mb-3" autofocus required>

      <label class="block text-sm mb-1">Passwort</label>
      <input type="password" name="password" class="w-full border rounded-md px-3 py-2 mb-4" required>

      <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-md">
        Anmelden
      </button>
    </form>

  </div>

</body>
</html>
